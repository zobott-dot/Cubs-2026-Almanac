<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The 2026 Cubs — A Season Almanac</title>
  <link rel="apple-touch-icon" href="./apple-touch-icon.png">
   <link rel="icon" type="image/png" href="./apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,600;0,8..60,700;0,8..60,900;1,8..60,400;1,8..60,600&family=JetBrains+Mono:wght@400;500;700&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #faf6ec;
    --paper-deep: #f0e9d6;
    --ink: #0e3386;          /* Cubs royal blue */
    --ink-soft: #3d5896;
    --accent: #cc3433;       /* Cubs red */
    --accent-deep: #9e1c2c;
    --rule: #c8b896;
    --win: #0e3386;          /* royal — wins are blue */
    --loss: #cc3433;         /* red — losses are red */
    --national: #c89b3f;
    --ivy: #2d5a3d;          /* the green of Wrigley ivy, used sparingly */
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Source Serif 4', Georgia, serif;
    font-size: 17px;
    line-height: 1.55;
    min-height: 100vh;
  }
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(124, 95, 50, 0.04) 0%, transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(124, 95, 50, 0.03) 0%, transparent 50%);
    pointer-events: none;
    z-index: 1;
  }
  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 50px 40px 80px;
    position: relative;
    z-index: 2;
  }
  .masthead {
    border-top: 6px double var(--ink);
    border-bottom: 2px solid var(--ink);
    padding: 14px 0 16px;
    text-align: center;
    margin-bottom: 32px;
    position: relative;
  }
  .masthead::before, .masthead::after {
    content: '';
    position: absolute;
    left: 0; right: 0;
    height: 2px;
    background: var(--accent);
  }
  .masthead::before { top: -10px; }
  .masthead::after  { bottom: -6px; }
  .masthead-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-soft);
    display: flex;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .title {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: clamp(44px, 6vw, 72px);
    line-height: 1;
    letter-spacing: -0.02em;
    color: var(--ink);
  }
  .title em {
    font-style: italic;
    color: var(--accent);
    font-weight: 400;
  }
  .masthead-record {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.15em;
    color: var(--ink);
    margin-top: 10px;
  }
  .masthead-record .sep {
    color: var(--accent);
    margin: 0 10px;
  }
  .masthead-record .gb {
    color: var(--ink-soft);
    font-weight: 400;
  }
  .masthead-pennants {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 3px;
    margin-top: 12px;
    padding: 0 20px;
  }
  .pennant {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 14px;
    height: 18px;
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: 9px;
    color: var(--paper);
    clip-path: polygon(0 0, 100% 0, 100% 70%, 50% 100%, 0 70%);
  }
  .pennant-w { background: var(--ink); }
  .pennant-l { background: var(--accent); }

  /* Hero band — between masthead and section I */
  .hero-band {
    border-top: 2px solid var(--ink);
    padding: 18px 0;
    margin: -8px 0 32px;
    display: flex;
    align-items: baseline;
    gap: 14px;
    flex-wrap: wrap;
  }
  .hero-band.is-empty { display: none; }
  .hero-primary, .hero-secondary {
    display: flex;
    align-items: baseline;
    gap: 10px;
  }
  .hero-secondary::before {
    content: '·';
    color: var(--rule);
    margin-right: 4px;
  }
  .hero-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 700;
  }
  .hero-date {
    font-family: 'Source Serif 4', serif;
    font-size: 16px;
    color: var(--ink);
  }
  .hero-sep { color: var(--rule); }
  .hero-matchup, .hero-score, .hero-record {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    color: var(--ink);
  }
  .hero-time {
    font-family: 'Source Serif 4', serif;
    font-size: 14px;
    color: var(--ink-soft);
  }
  .hero-channel, .hero-state {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }
  .hero-channel.national {
    color: var(--ink);
    font-weight: 700;
  }
  .hero-channel.national::before {
    content: '★ ';
    color: var(--national);
  }
  .hero-standing {
    font-family: 'Source Serif 4', serif;
    font-size: 14px;
    color: var(--ink-soft);
  }
  @media (max-width: 600px) {
    .hero-band { flex-direction: column; align-items: flex-start; gap: 6px; }
    .hero-secondary::before { display: none; }
  }
  @media (max-width: 400px) {
    .hero-channel { display: none; }
  }

  .dateline {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    text-align: center;
    color: var(--ink-soft);
    padding-top: 10px;
    border-bottom: 1px solid var(--rule);
    padding-bottom: 14px;
    margin-bottom: 36px;
  }
  .section-head {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin: 48px 0 20px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--ink);
  }

  /* Section wrapper (drag removed; collapse retained) */
  .draggable-section .section-head {
    align-items: center;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    transition: opacity 0.15s ease;
  }
  .draggable-section .section-head:hover {
    opacity: 0.7;
  }
  .collapse-toggle {
    margin-left: auto;
    background: none;
    border: none;
    font-family: 'Source Serif 4', serif;
    font-size: 18px;
    line-height: 1;
    color: var(--accent);
    padding: 6px 8px;
    pointer-events: none;
    user-select: none;
    -webkit-user-select: none;
  }
  .draggable-section.collapsed .section-body { display: none; }
  .draggable-section.collapsed .section-head {
    margin-bottom: 0;
    border-bottom-style: dashed;
  }

  /* Inline channel badge for sections IV & V */
  .game-channel {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-top: 3px;
    line-height: 1;
  }
  .game-channel.national {
    color: var(--ink);
    font-weight: 700;
  }
  .game-channel.national::before {
    content: '★ ';
    color: var(--national);
  }
  .section-roman {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-weight: 700;
    font-size: 22px;
    color: var(--accent);
    letter-spacing: 0.02em;
  }
  .section-title {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 28px;
    letter-spacing: -0.01em;
    color: var(--ink);
  }
  .section-rule {
    flex: 1;
  }
  .pulse-section {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 32px;
    align-items: end;
    margin-bottom: 8px;
  }
  .pulse-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 8px;
  }
  .pulse-strip {
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.15em;
    line-height: 1;
    word-break: break-all;
  }
  .pulse-W { color: var(--win); }
  .pulse-L { color: var(--accent); }
  .pulse-record {
    font-family: 'Playfair Display', serif;
    font-size: 56px;
    font-weight: 700;
    line-height: 0.9;
    text-align: right;
  }
  .pulse-record .pct {
    display: block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.1em;
    color: var(--ink-soft);
    margin-top: 4px;
  }
  .two-col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 48px;
    margin-top: 16px;
  }
  @media (max-width: 760px) {
    .two-col { grid-template-columns: 1fr; gap: 36px; }
    .pulse-section { grid-template-columns: 1fr; }
    .pulse-record { text-align: left; }
    .container { padding: 30px 20px 60px; }
  }
  .standings {
    width: 100%;
    border-collapse: collapse;
    font-size: 15px;
  }
  .standings th {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-soft);
    text-align: right;
    padding: 8px 6px;
    border-bottom: 1px solid var(--ink);
  }
  .standings th:first-child { text-align: left; }
  .standings td {
    padding: 11px 6px;
    border-bottom: 1px dotted var(--rule);
    text-align: right;
    font-variant-numeric: tabular-nums;
  }
  .standings td:first-child { text-align: left; font-weight: 600; }
  .standings tr.cubs-row { background: rgba(122, 31, 43, 0.06); }
  .standings tr.cubs-row td { color: var(--accent-deep); font-weight: 700; }
  .standings tr.cubs-row td:first-child::before {
    content: '▸ ';
    color: var(--accent);
  }
  .game {
    display: grid;
    grid-template-columns: 70px 1fr auto;
    gap: 14px;
    padding: 12px 0;
    border-bottom: 1px dotted var(--rule);
    align-items: center;
  }
  .game-date {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.05em;
    color: var(--ink-soft);
    text-transform: uppercase;
  }
  .game-matchup { font-family: 'Source Serif 4', serif; font-size: 15px; }
  .game-matchup .vs { color: var(--ink-soft); font-style: italic; margin: 0 4px; }
  .game-matchup .home-mark {
    color: var(--ink-soft);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
  }
  .game-result {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.05em;
    padding: 3px 8px;
    border: 1px solid currentColor;
  }
  .game-result.W { color: var(--win); }
  .game-result.L { color: var(--accent); }
  .watch-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 28px;
    margin-top: 8px;
  }
  @media (max-width: 700px) { .watch-grid { grid-template-columns: 1fr; } }
  .watch-card {
    border: 1px solid var(--rule);
    background: rgba(255, 255, 255, 0.3);
    padding: 22px 24px;
  }
  .watch-card h3 {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .watch-card .market {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 14px;
  }
  .watch-card p {
    font-size: 14px;
    line-height: 1.55;
    color: var(--ink-soft);
    margin-bottom: 10px;
  }
  .watch-list {
    list-style: none;
    margin-top: 12px;
  }
  .watch-list li {
    padding: 8px 0;
    border-bottom: 1px dotted var(--rule);
    font-size: 14px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 12px;
    align-items: baseline;
  }
  .watch-list li:last-child { border-bottom: none; }
  .watch-list .name { font-weight: 600; }
  .watch-list .price {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--ink-soft);
    white-space: nowrap;
  }
  .watch-note {
    font-style: italic;
    font-size: 13px;
    color: var(--ink-soft);
    margin-top: 18px;
    padding-top: 14px;
    border-top: 1px solid var(--rule);
    line-height: 1.6;
  }
  .national-windows {
    margin-top: 18px;
    padding: 16px 20px;
    background: var(--paper-deep);
    border-left: 3px solid var(--national);
    font-size: 14px;
    line-height: 1.6;
  }
  .national-windows strong { color: var(--ink); font-weight: 700; }
  .filters {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin: 16px 0 24px;
    padding: 14px;
    background: var(--paper-deep);
    border: 1px solid var(--rule);
  }
  .filter-group {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
  }
  .filters-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-right: 4px;
    min-width: 38px;
  }
  .filter-btn, .sort-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 6px 12px;
    background: var(--paper);
    border: 1px solid var(--rule);
    color: var(--ink-soft);
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .filter-btn:hover, .sort-btn:hover { border-color: var(--ink); color: var(--ink); }
  .filter-btn.active, .sort-btn.active {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }
  .schedule-month { margin-bottom: 32px; }
  .schedule-month-head {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 22px;
    color: var(--accent);
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--rule);
  }
  .schedule-month.month-collapsible .schedule-month-head {
    display: flex;
    align-items: baseline;
    gap: 12px;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    transition: opacity 0.15s ease;
  }
  .schedule-month.month-collapsible .schedule-month-head:hover { opacity: 0.7; }
  .schedule-month-head .month-name { flex: 1; }
  .schedule-month-head .month-meta {
    font-family: 'JetBrains Mono', monospace;
    font-style: normal;
    font-size: 11px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }
  .schedule-month-head .month-chevron {
    font-family: 'Source Serif 4', serif;
    font-style: normal;
    font-size: 18px;
    line-height: 1;
    color: var(--accent);
  }
  .schedule-month.month-collapsible:not(.month-collapsed) .month-meta { display: none; }
  .schedule-month.month-collapsed .schedule-game { display: none; }
  .schedule-month.month-collapsed .schedule-month-head {
    margin-bottom: 0;
    border-bottom-style: dashed;
  }
  /* Section III per-column collapse — same chevron treatment as months */
  .recap-col-head {
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    transition: opacity 0.15s ease;
  }
  .recap-col-head:hover { opacity: 0.7; }
  .recap-col-head .recap-col-chevron {
    font-family: 'Source Serif 4', serif;
    font-style: normal;
    font-size: 18px;
    line-height: 1;
    color: var(--accent);
    margin-left: 8px;
  }
  .recap-col.col-collapsed .recap-col-body { display: none; }
  .schedule-game {
    display: grid;
    grid-template-columns: 80px 1fr 70px 180px 38px;
    gap: 14px;
    padding: 9px 4px;
    border-bottom: 1px dotted var(--rule);
    align-items: center;
    font-size: 14px;
  }
  @media (max-width: 700px) {
    .schedule-game {
      grid-template-columns: 96px 1fr 60px;
      gap: 10px;
      font-size: 13px;
    }
    .schedule-game .sched-time, .schedule-game .sched-channel { display: none; }
  }
  .schedule-game.played { color: var(--ink-soft); }
  .schedule-game.today {
    background: rgba(122, 31, 43, 0.08);
    border-left: 3px solid var(--accent);
    padding-left: 10px;
  }
  .sched-date {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--ink-soft);
    white-space: nowrap;
  }
  .sched-opp .home-mark {
    color: var(--ink-soft);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    margin-right: 2px;
  }
  .sched-time {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-soft);
    text-align: right;
  }
  .sched-channel {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.05em;
    color: var(--ink-soft);
    text-transform: uppercase;
    text-align: right;
  }
  .sched-channel.national { color: var(--ink); font-weight: 700; }
  .sched-channel.national::before { content: '★ '; color: var(--national); }
  .sched-result {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    text-align: center;
    padding: 2px 6px;
    border: 1px solid currentColor;
  }
  .sched-result.W { color: var(--win); }
  .sched-result.L { color: var(--accent); }
  .sched-result.live { color: var(--accent); }
  .sched-result.empty { border: none; }
  .projection {
    background: var(--paper-deep);
    border: 1px solid var(--rule);
    padding: 32px;
    margin-top: 24px;
  }
  .projection-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 24px;
    margin-top: 24px;
  }
  @media (max-width: 600px) {
    .projection-row { grid-template-columns: 1fr; gap: 12px; }
  }
  .proj-stat { text-align: center; }
  .proj-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 8px;
  }
  .proj-value {
    font-family: 'Playfair Display', serif;
    font-size: 42px;
    font-weight: 700;
    line-height: 1;
    color: var(--ink);
  }
  .proj-value .small {
    font-size: 18px;
    color: var(--ink-soft);
    font-weight: 400;
  }
  .proj-controls { margin-top: 8px; }
  .proj-controls label {
    display: block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 12px;
  }
  .slider-wrap { display: flex; align-items: center; gap: 16px; }
  input[type="range"] {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 2px;
    background: var(--ink);
    outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 16px;
    height: 16px;
    background: var(--accent);
    border: 2px solid var(--paper);
    box-shadow: 0 0 0 1px var(--ink);
    cursor: pointer;
    border-radius: 50%;
  }
  input[type="range"]::-moz-range-thumb {
    width: 16px;
    height: 16px;
    background: var(--accent);
    border: 2px solid var(--paper);
    box-shadow: 0 0 0 1px var(--ink);
    cursor: pointer;
    border-radius: 50%;
  }
  .slider-value {
    display: flex;
    align-items: baseline;
    justify-content: flex-end;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 700;
    color: var(--accent);
    width: 34ch;
    flex: 0 0 auto;
    text-align: right;
    white-space: nowrap;
  }
  .pace-reset {
    background: none;
    border: none;
    padding: 0;
    margin-left: 10px;
    cursor: pointer;
    font: inherit;
    color: inherit;
    white-space: nowrap;
  }
  .pace-reset::before { content: '·'; margin-right: 8px; }
  .pace-reset:hover { opacity: 0.7; }
  .pace-reset[hidden] { display: none; }
  .lede {
    font-family: 'Source Serif 4', serif;
    font-size: 17px;
    line-height: 1.65;
    color: var(--ink-soft);
    margin: 24px 0;
  }
  .lede::first-letter {
    font-family: 'Playfair Display', serif;
    font-size: 64px;
    font-weight: 900;
    float: left;
    line-height: 0.85;
    margin: 4px 10px -4px 0;
    color: var(--accent);
  }

  /* Floating control cluster (refresh + collapse all) */
  .floating-controls {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 100;
    display: flex;
    gap: 8px;
  }
  .floating-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    background: var(--ink);
    color: var(--paper);
    border: none;
    border-top: 3px solid var(--accent);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(14, 51, 134, 0.25);
    transition: all 0.15s ease;
  }
  .floating-btn:hover:not(:disabled) {
    background: var(--accent);
    border-top-color: var(--ink);
    box-shadow: 0 6px 18px rgba(204, 52, 51, 0.3);
  }
  .floating-btn:active:not(:disabled) {
    transform: translateY(1px);
  }
  .floating-btn:disabled {
    opacity: 0.6;
    cursor: wait;
  }
  .floating-icon {
    font-family: 'Source Serif 4', serif;
    font-size: 14px;
    line-height: 1;
  }
  .refresh-btn .floating-icon {
    font-size: 16px;
    display: inline-block;
  }
  .refresh-btn.spinning .floating-icon {
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  /* Refresh status toast */
  .refresh-status {
    position: fixed;
    bottom: 80px;
    right: 24px;
    z-index: 99;
    max-width: 280px;
    padding: 10px 14px;
    background: var(--paper);
    border: 1px solid var(--ink);
    border-left: 4px solid var(--accent);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.05em;
    color: var(--ink);
    box-shadow: 0 4px 12px rgba(14, 51, 134, 0.15);
    opacity: 0;
    transform: translateY(8px);
    pointer-events: none;
    transition: opacity 0.2s ease, transform 0.2s ease;
  }
  .refresh-status.visible {
    opacity: 1;
    transform: translateY(0);
  }
  .refresh-status.error {
    border-left-color: var(--accent);
    color: var(--accent-deep);
  }

  @media (max-width: 600px) {
    .floating-controls {
      bottom: 16px;
      right: 16px;
    }
    .floating-btn {
      padding: 9px 11px;
      font-size: 10px;
      gap: 6px;
    }
    .refresh-status {
      bottom: 72px;
      right: 16px;
      max-width: calc(100vw - 32px);
    }
  }

        section.classList.toggle('collapsed');

        btn.textContent = isCollapsed ? '▸' : '▾';
        btn.title = isCollapsed ? 'Expand' : 'Collapse';
        refreshToggleAllState();

    });

  // ============================================================
  // RENDERERS — each is idempotent, can be re-called after refresh
  // ============================================================

  function renderPulseStrip() {
    const playedGames = fullSchedule.filter(isFinal);
    const pulseHTML = playedGames.map(g => {
      const w = g.result.us > g.result.them;
      return w ? '<span class="pulse-W">W</span>' : '<span class="pulse-L">L</span>';
    }).join(' ');
    document.getElementById('pulseStrip').innerHTML = pulseHTML;

    const winsCount = playedGames.filter(g => g.result.us > g.result.them).length;
    const lossesCount = playedGames.length - winsCount;
    const pctVal = playedGames.length > 0
      ? (winsCount / playedGames.length).toFixed(3).replace(/^0/, '')
      : '\u2014';
    document.getElementById('pulseRecord').innerHTML =
      `${winsCount}\u2013${lossesCount}<span class="pct">${pctVal} \u00b7 ${playedGames.length} GAMES</span>`;
  }

  function renderStandings() {
    const stbody = document.getElementById('standingsBody');
    stbody.innerHTML = '';
    if (!standings.length) return;
    const leader = standings[0];
    standings.forEach(t => {
      const tpct = (t.w + t.l) > 0
        ? (t.w / (t.w + t.l)).toFixed(3).replace(/^0/, '')
        : '\u2014';
      const gb = ((leader.w - t.w) + (t.l - leader.l)) / 2;
      const gbDisplay = gb === 0 ? '\u2014' : gb.toFixed(1);
      const isCubs = t.abbr === 'CHC';
      const tr = document.createElement('tr');
      if (isCubs) tr.className = 'cubs-row';
      tr.innerHTML = `
        <td>${t.team}</td>
        <td>${t.w}</td>
        <td>${t.l}</td>
        <td>${tpct}</td>
        <td>${gbDisplay}</td>`;
      stbody.appendChild(tr);
    });
  }

  function renderRecent() {
    const recentDiv = document.getElementById('recentGames');
    recentDiv.innerHTML = '';
    const playedGames = fullSchedule.filter(isFinal);
    // Oldest at top, most recent at the bottom — flows into "Coming Up"
    // so the two columns read as a single chronological timeline.
    const recent = playedGames.slice(-5);
    recent.forEach(g => {
      const result = g.result.us > g.result.them ? 'W' : 'L';
      const homeMark = g.home ? 'vs.' : '@';
      const channelClass = g.tvNational ? 'national' : '';
      const channelText = g.tvNational || 'Marquee';
      const div = document.createElement('div');
      div.className = 'game';
      div.innerHTML = `
        <div class="game-date">${formatShortDate(g.date)}</div>
        <div class="game-matchup">
          <span class="home-mark">${homeMark}</span> ${g.opp}
          <span class="vs">\u2014</span> ${g.result.us}-${g.result.them}
          <div class="game-channel ${channelClass}">${channelText}</div>
        </div>
        <div class="game-result ${result}">${result}</div>`;
      recentDiv.appendChild(div);
    });
  }

  function renderUpcoming() {
    const upDiv = document.getElementById('upcomingGames');
    upDiv.innerHTML = '';
    const upcoming = fullSchedule.filter(g => g.result === null && !g.live && new Date(g.date + 'T12:00:00') >= today).slice(0, 8);
    upcoming.forEach(g => {

      const channelClass = g.tvNational ? 'national' : '';

  function renderMasthead() {
    const shortDateOpts = { month: 'long', day: 'numeric', year: 'numeric' };
    document.getElementById('datelineMeta').textContent = today.toLocaleDateString('en-US', shortDateOpts);

    const playedGames = fullSchedule.filter(isFinal);
    const cubsW = playedGames.filter(g => g.result.us > g.result.them).length;
    const cubsL = playedGames.length - cubsW;
    const cubsPct = playedGames.length > 0
      ? (cubsW / playedGames.length).toFixed(3).replace(/^0/, '')
      : '\u2014';
    const ldr = standings[0];
    const cubs = standings.find(s => s.abbr === 'CHC') || { w: cubsW, l: cubsL };
    const gamesBack = ldr ? ((ldr.w - cubs.w) + (cubs.l - ldr.l)) / 2 : 0;
    let gbStr;
    if (gamesBack === 0) {
      const sharedTop = ldr && standings.filter(s => s.w === ldr.w && s.l === ldr.l).length > 1;
      gbStr = sharedTop ? 'tied for 1st' : 'holds 1st';
    } else {
      gbStr = `${gamesBack.toFixed(1)} GB`;
    }
    document.getElementById('mastheadRecord').innerHTML =
      `${cubsW}\u2013${cubsL} <span class="sep">·</span> ${cubsPct} <span class="sep">·</span> <span class="gb">${gbStr}</span>`;

    const pennantsEl = document.getElementById('mastheadPennants');
    pennantsEl.innerHTML = playedGames.map(g => {
      const win = g.result.us > g.result.them;
      return `<span class="pennant pennant-${win ? 'w' : 'l'}" title="${g.date}: ${win ? 'W' : 'L'}">${win ? 'W' : 'L'}</span>`;
    }).join('');
  }

  function nowInChicago() {
    const parts = new Intl.DateTimeFormat('en-CA', {
      timeZone: 'America/Chicago',
      year: 'numeric', month: '2-digit', day: '2-digit',
      hour: '2-digit', minute: '2-digit', hour12: false,
    }).formatToParts(new Date());
    const get = t => parts.find(p => p.type === t).value;
    return {
      date: `${get('year')}-${get('month')}-${get('day')}`,
      time: `${get('hour')}:${get('minute')}`,
    };
  }

  function parseGameTime(timeStr) {
    if (!timeStr) return null;
    const m = timeStr.match(/^(\d{1,2}):(\d{2})\s*(AM|PM)$/i);
    if (!m) return null;
    let h = parseInt(m[1], 10);
    const min = m[2];
    const ampm = m[3].toUpperCase();
    if (ampm === 'PM' && h !== 12) h += 12;
    if (ampm === 'AM' && h === 12) h = 0;
    return `${String(h).padStart(2, '0')}:${min}`;
  }

  // A "final" game has a result AND is not currently live. Live games
  // carry g.result too (running score), so anywhere we're asking "is
  // this game over?" we need both checks, not just result !== null.
  function isFinal(g) { return g.result !== null && !g.live; }

  function classifyTodayGame(g, nowTime) {
    if (isFinal(g)) return 'final';
    if (g.live) return 'inprogress';
    const gt = parseGameTime(g.time);
    if (!gt) return 'pregame';
    return gt > nowTime ? 'pregame' : 'inprogress';
  }

  function pickTodayGame(gamesToday, nowTime) {
    const classified = gamesToday.map(g => ({ g, state: classifyTodayGame(g, nowTime), gt: parseGameTime(g.time) }));
    const pregames = classified.filter(c => c.state === 'pregame');
    if (pregames.length) {
      pregames.sort((a, b) => (a.gt || '').localeCompare(b.gt || ''));
      return pregames[0];
    }
    const inprogress = classified.filter(c => c.state === 'inprogress');
    if (inprogress.length) {
      inprogress.sort((a, b) => (a.gt || '').localeCompare(b.gt || ''));
      return inprogress[0];
    }
    const finals = classified.filter(c => c.state === 'final');
    if (finals.length) {
      finals.sort((a, b) => (b.gt || '').localeCompare(a.gt || ''));
      return finals[0];
    }
    return null;
  }

  function daysBetween(dateA, dateB) {
    const a = new Date(dateA + 'T12:00:00');
    const b = new Date(dateB + 'T12:00:00');
    return Math.round((b - a) / (1000 * 60 * 60 * 24));
  }

  function formatNextDateLabel(gameDate, todayDate) {
    const diff = daysBetween(todayDate, gameDate);
    const d = new Date(gameDate + 'T12:00:00');
    if (diff === 1) return 'Tomorrow';
    if (diff >= 2 && diff <= 7) return d.toLocaleDateString('en-US', { weekday: 'long' });
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  }

  function ordinal(n) {
    const s = ['th', 'st', 'nd', 'rd'];
    const v = n % 100;
    return n + (s[(v - 20) % 10] || s[v] || s[0]);
  }

  function heroChannelMarkup(g) {
    if (g.tvNational) {
      return `<span class="hero-channel national">${g.tvNational}</span>`;
    }
    return '<span class="hero-channel">Marquee</span>';
  }

  function heroMatchupMarkup(g) {
    const vs = g.home ? 'vs' : 'at';
    return `<span class="hero-matchup">${vs} <strong>${g.opp}</strong></span>`;
  }

  function computeHeroContent() {
    if (!Array.isArray(fullSchedule) || fullSchedule.length === 0) return null;
    const { date: todayDate, time: nowTime } = nowInChicago();

    const gamesToday = fullSchedule.filter(g => g.date === todayDate);
    if (gamesToday.length > 0) {
      const picked = pickTodayGame(gamesToday, nowTime);
      if (!picked) return null;
      const { g, state } = picked;
      const primary = '<span class="hero-label">Today</span>';
      let secondary;
      if (state === 'final') {
        const cubsWon = g.result.us > g.result.them;
        const oppName = ABBR_TO_NICKNAME[g.opp] || g.opp;
        const score = cubsWon
          ? `Cubs ${g.result.us}, ${oppName} ${g.result.them}`
          : `${oppName} ${g.result.them}, Cubs ${g.result.us}`;
        secondary = `<span class="hero-score"><strong>${score}</strong></span><span class="hero-sep">·</span><span class="hero-state">final</span>`;
      } else if (state === 'inprogress') {
        const hasLiveScore = g.result
          && typeof g.result.us === 'number'
          && typeof g.result.them === 'number';
        if (hasLiveScore) {
          // Match the final-case typography: leader listed first. On a
          // tie, Cubs lead (this is a Cubs almanac — their frame).
          const cubsLead = g.result.us >= g.result.them;
          const oppName = ABBR_TO_NICKNAME[g.opp] || g.opp;
          const score = cubsLead
            ? `Cubs ${g.result.us}, ${oppName} ${g.result.them}`
            : `${oppName} ${g.result.them}, Cubs ${g.result.us}`;
          secondary = `${heroMatchupMarkup(g)}<span class="hero-sep">·</span><span class="hero-score"><strong>${score}</strong></span><span class="hero-sep">·</span>${heroChannelMarkup(g)}`;
        } else {
          secondary = `${heroMatchupMarkup(g)}<span class="hero-sep">·</span><span class="hero-time">${g.time} CT</span><span class="hero-sep">·</span><span class="hero-state">in progress</span><span class="hero-sep">·</span>${heroChannelMarkup(g)}`;
        }
      } else {
        secondary = `${heroMatchupMarkup(g)}<span class="hero-sep">·</span><span class="hero-time">${g.time} CT</span><span class="hero-sep">·</span>${heroChannelMarkup(g)}`;
      }
      return { primary, secondary };
    }

    const futureGames = fullSchedule.filter(g => g.date > todayDate && !g.result);
    if (futureGames.length > 0) {
      const next = futureGames[0];
      const dateLabel = formatNextDateLabel(next.date, todayDate);
      const primary = `<span class="hero-label">Next</span><span class="hero-sep">·</span><span class="hero-date">${dateLabel}</span>`;
      const secondary = `${heroMatchupMarkup(next)}<span class="hero-sep">·</span><span class="hero-time">${next.time} CT</span><span class="hero-sep">·</span>${heroChannelMarkup(next)}`;
      return { primary, secondary };
    }

    const played = fullSchedule.filter(isFinal);
    if (played.length === 0) return null;
    const wins = played.filter(g => g.result.us > g.result.them).length;
    const losses = played.length - wins;
    const primary = '<span class="hero-label">Season complete</span>';
    const recordStr = `${wins}\u2013${losses}`;
    let secondary = `<span class="hero-record"><strong>${recordStr}</strong></span>`;
    const rankIdx = Array.isArray(standings) ? standings.findIndex(s => s.abbr === 'CHC') : -1;
    if (rankIdx >= 0) {
      const rank = ordinal(rankIdx + 1);
      secondary += `<span class="hero-sep">·</span><span class="hero-standing">${rank} in NL Central</span>`;
    }
    return { primary, secondary };
  }

  function renderHero() {
    const band = document.getElementById('heroBand');
    if (!band) return;
    try {
      const content = computeHeroContent();
      if (!content || !content.primary) {
        band.classList.add('is-empty');
        band.innerHTML = '';
        return;
      }
      band.classList.remove('is-empty');
      band.innerHTML = `<div class="hero-primary">${content.primary}</div><div class="hero-secondary">${content.secondary}</div>`;
    } catch {
      band.classList.add('is-empty');
      band.innerHTML = '';
    }
  }

  function renderProjection() {
    const played = fullSchedule.filter(isFinal);
    if (played.length === 0) {
      currentPaceSliderValue = null;
    } else {
      const won = played.filter(g => g.result.us > g.result.them).length;
      const pct = won / played.length;
      const step = Number(slider.step) || 5;
      const min = Number(slider.min) || 300;
      const max = Number(slider.max) || 700;
      let v = Math.round(pct * 1000 / step) * step;
      v = Math.max(min, Math.min(max, v));
      currentPaceSliderValue = v;
      slider.value = v;
    }
    updateProjection();
  }

  function renderLastUpdated(timestamp) {
    if (!timestamp) return;
    const d = timestamp instanceof Date ? timestamp : new Date(timestamp);
    if (isNaN(d.getTime())) return;
    const el = document.getElementById('lastUpdatedMeta');
    if (!el) return;
    const dateStr = d.toLocaleDateString('en-US', {
      month: 'long', day: 'numeric', year: 'numeric',
      timeZone: 'America/Chicago',
    });
    const timeStr = d.toLocaleTimeString('en-US', {
      hour: 'numeric', minute: '2-digit',
      timeZone: 'America/Chicago',
    });
    el.textContent = `Updated ${dateStr} · ${timeStr} CT`;
  }

  // Render everything that depends on data — call after any refresh
  function renderAll() {
    renderMasthead();
    renderHero();
    renderPulseStrip();
    renderStandings();
    renderRecent();
    renderUpcoming();
    renderSchedule();
    renderProjection();
  }

  // ============================================================
  // FULL SCHEDULE (filter/sort logic — references fullSchedule live)
  // ============================================================
  const scheduleDiv = document.getElementById('fullSchedule');
  const monthNames = ['January','February','March','April','May','June',
                      'July','August','September','October','November','December'];

  function viewingGroup(g) {
    if (g.tvNational) return { key: 'national', label: 'National Broadcast', subtitle: 'Available without Marquee — see Where to Watch above' };
    return { key: 'marquee', label: 'Marquee Sports Network', subtitle: 'Cable, Hulu+Live, Fubo, Marquee app, or Prime Video' };
  }

  const state = { filter: 'all', sort: 'date' };
  const openMonths = new Set();
  let currentPaceSliderValue = null;

  function buildGameRow(g) {
    const d = new Date(g.date + 'T12:00:00');
    const dayLabel = d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
    const homeMark = g.home ? 'vs.' : '@';
    const todayStr = nowInChicago().date;
    const isToday = g.date === todayStr;
    const isLive = g.live === true;
    const isComplete = g.result !== null && !isLive;
    const hasScore = g.result !== null;

    let resultBadge = '<span class="sched-result empty"></span>';
    if (isLive) {
      resultBadge = `<span class="sched-result live" title="In progress">\u25CF</span>`;
    } else if (isComplete) {
      const w = g.result.us > g.result.them;
      resultBadge = `<span class="sched-result ${w ? 'W' : 'L'}">${w ? 'W' : 'L'}</span>`;
    }

    const channel = g.tvNational
      ? `<span class="sched-channel national">${g.tvNational}</span>`
      : `<span class="sched-channel">Marquee</span>`;

    const scoreText = hasScore ? ` <span style="color:var(--ink-soft);font-size:12px;">(${g.result.us}-${g.result.them})</span>` : '';

    const gameDiv = document.createElement('div');
    gameDiv.className = `schedule-game ${isComplete ? 'played' : ''} ${isToday ? 'today' : ''}`;
    gameDiv.innerHTML = `
      <div class="sched-date">${dayLabel}</div>
      <div class="sched-opp"><span class="home-mark">${homeMark}</span> ${g.opp}${scoreText}</div>
      <div class="sched-time">${g.time}</div>
      ${channel}
      ${resultBadge}`;
    return gameDiv;
  }

  function renderSchedule() {
    scheduleDiv.innerHTML = '';

    const filtered = fullSchedule.filter(g => {
      if (state.filter === 'home') return g.home;
      if (state.filter === 'away') return !g.home;
      if (state.filter === 'rivals') return RIVALS.includes(g.opp);
      if (state.filter === 'upcoming') return g.result === null && !g.live && new Date(g.date + 'T12:00:00') >= today;
      return true;
    });

    if (filtered.length === 0) {
      scheduleDiv.innerHTML = '<p style="text-align:center; color:var(--ink-soft); font-style:italic; padding:40px 0;">No games match this filter.</p>';
      return;
    }

    if (state.sort === 'date') {
      // Group by month
      const byMonth = {};
      filtered.forEach(g => {
        const d = new Date(g.date + 'T12:00:00');
        const key = d.getFullYear() + '-' + String(d.getMonth()).padStart(2, '0');
        if (!byMonth[key]) byMonth[key] = { name: monthNames[d.getMonth()] + ' ' + d.getFullYear(), games: [] };
        byMonth[key].games.push(g);
      });

      Object.keys(byMonth).sort().forEach(key => {
        const month = byMonth[key];
        const total = month.games.length;
        const played = month.games.filter(isFinal).length;
        const isOpen = openMonths.has(month.name);
        const monthDiv = document.createElement('div');
        monthDiv.className = 'schedule-month month-collapsible' + (isOpen ? '' : ' month-collapsed');
        const head = document.createElement('div');
        head.className = 'schedule-month-head';
        head.innerHTML = `<span class="month-name">${month.name}</span><span class="month-meta">${total} game${total === 1 ? '' : 's'} · ${played} played</span><span class="month-chevron" aria-hidden="true">${isOpen ? '▾' : '▸'}</span>`;
        head.addEventListener('click', () => {
          const isCollapsed = monthDiv.classList.toggle('month-collapsed');
          head.querySelector('.month-chevron').textContent = isCollapsed ? '▸' : '▾';
          if (isCollapsed) openMonths.delete(month.name);
          else openMonths.add(month.name);
        });
        monthDiv.appendChild(head);
        month.games.forEach(g => monthDiv.appendChild(buildGameRow(g)));
        scheduleDiv.appendChild(monthDiv);
      });
    } else {
      // Group by channel — order: National first, then Marquee
      const byChannel = {};
      filtered.forEach(g => {
        const grp = viewingGroup(g);
        if (!byChannel[grp.key]) byChannel[grp.key] = { ...grp, games: [] };
        byChannel[grp.key].games.push(g);
      });

      const order = ['national', 'marquee'];
      order.forEach(key => {
        if (!byChannel[key]) return;
        const group = byChannel[key];
        const groupDiv = document.createElement('div');
        groupDiv.className = 'schedule-month';
        groupDiv.innerHTML = `
          <div class="schedule-month-head">
            ${group.label}
            <span style="font-family:'JetBrains Mono',monospace; font-size:11px; font-style:normal; letter-spacing:0.1em; text-transform:uppercase; color:var(--ink-soft); margin-left:10px;">${group.games.length} game${group.games.length === 1 ? '' : 's'}</span>
          </div>
          <p style="font-size:13px; color:var(--ink-soft); font-style:italic; margin: 4px 0 12px;">${group.subtitle}</p>`;
        group.games.forEach(g => groupDiv.appendChild(buildGameRow(g)));
        scheduleDiv.appendChild(groupDiv);
      });
    }
  }

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.filter = btn.dataset.filter;
      renderSchedule();
    });
  });

  document.querySelectorAll('.sort-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.sort = btn.dataset.sort;
      renderSchedule();
    });
  });

  renderSchedule();

  // Projection
  const slider = document.getElementById('paceSlider');
  const sliderValue = document.getElementById('sliderValue');
  const paceReset = document.getElementById('paceReset');
  const projWins = document.getElementById('projWins');
  const projRecord = document.getElementById('projRecord');
  const projPostseason = document.getElementById('projPostseason');

  function updateProjection() {
    const p = slider.value / 1000;
    const isCurrent = currentPaceSliderValue !== null && Number(slider.value) === currentPaceSliderValue;
    const pctStr = p.toFixed(3).replace(/^0/, '');
    sliderValue.textContent = isCurrent ? `current pace · ${pctStr}` : pctStr;
    paceReset.hidden = isCurrent || currentPaceSliderValue === null;
    const w = Math.round(p * 162);
    const l = 162 - w;
    projWins.innerHTML = `${w}<span class="small"> / 162</span>`;
    projRecord.textContent = `${w}\u2013${l}`;

    let verdict;
    if (w >= 95) verdict = 'Division contender';
    else if (w >= 88) verdict = 'Wild card in play';
    else if (w >= 82) verdict = 'In the conversation';
    else if (w >= 75) verdict = 'Below the line';
    else verdict = 'A rebuilding year';
    projPostseason.innerHTML = `<span class="small">${verdict}</span>`;
  }

  slider.addEventListener('input', updateProjection);

  paceReset.addEventListener('click', () => {
    if (currentPaceSliderValue === null) return;
    slider.value = currentPaceSliderValue;
    updateProjection();
  });

  // ============================================================
  // Initial render — uses the embedded data
  // ============================================================
  renderAll();
  renderLastUpdated(today);

  // ============================================================
  // REFRESH FROM data.json (updated daily by GitHub Actions)
  // ============================================================
  // The data.json file lives alongside this HTML on GitHub Pages.
  // Same-origin = no CORS issues. The GitHub Action regenerates it
  // every few hours by calling the MLB API server-side.

  function showStatus(msg, isError) {
    const el = document.getElementById('refreshStatus');
    el.textContent = msg;
    el.classList.toggle('error', !!isError);
    el.classList.add('visible');
    clearTimeout(showStatus._t);
    showStatus._t = setTimeout(() => el.classList.remove('visible'), 3500);
  }

  async function fetchData(silent) {
    const btn = document.getElementById('refreshBtn');
    if (!silent) {
      btn.disabled = true;
      btn.classList.add('spinning');
      showStatus('Loading latest data\u2026');
    }

    try {
      // Cache-buster ensures we get the freshest copy, not a stale CDN version
      const res = await fetch('./data.json?t=' + Date.now());
      if (!res.ok) throw new Error('data.json fetch failed (' + res.status + ')');
      const data = await res.json();

      if (!data.schedule || !data.standings) {
        throw new Error('data.json missing required fields');
      }

      // Preserve our hardcoded national-TV markers across refreshes
      data.schedule.forEach(g => {
        if (!g.tvNational) {
          const lookup = NATIONAL_TV_LOOKUP[g.date + '|' + g.opp];
          if (lookup) g.tvNational = lookup;
        }
      });

      fullSchedule = data.schedule;
      standings = data.standings;
      today = new Date();
      renderAll();

      renderLastUpdated(data.updatedAt);

      if (!silent) showStatus('Updated.');
    } catch (err) {
      console.error(err);
      if (!silent) showStatus('Could not update \u2014 please try again later.', true);
    } finally {
      btn.disabled = false;
      btn.classList.remove('spinning');
    }
  }

  // Preserve any tvNational annotations from the embedded fallback data
  // so they persist across refreshes even though data.json doesn't carry them.
  const NATIONAL_TV_LOOKUP = {};
  fullSchedule.forEach(g => {
    if (g.tvNational) NATIONAL_TV_LOOKUP[g.date + '|' + g.opp] = g.tvNational;
  });

  document.getElementById('refreshBtn').onclick = () => fetchData(false);

  // Try to load fresh data on page load, silently. If it fails, the page
  // shows the embedded data and no error toast appears.
  fetchData(true);

  function formatShortDate(dateStr) {
    const d = new Date(dateStr + 'T12:00:00');
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }).toUpperCase();
  }
</script>
</body>
</html>
