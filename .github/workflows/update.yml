name: Update Cubs data

on:
  # Run every 3 hours during the season
  schedule:
    - cron: "0 */3 * * *"
  # Allow manual runs from the Actions tab
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run updater
        run: python update_data.py

      - name: Commit data.json if changed
        run: |
          if [[ -n "$(git status --porcelain data.json)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data.json
            git commit -m "Update Cubs data $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          else
            echo "No changes to data.json"
          fi
